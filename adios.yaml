runtime: node@23
preset: nextjs
type: app
scaffold_cmd: cp -rn /app/. /workspace/
build_cmd: |
  npm ci
  npm run build
  mkdir -p .next/standalone/.next
  cp -R public .next/standalone/public
  cp -R .next/static .next/standalone/.next/static
start_cmd: HOSTNAME=0.0.0.0 PORT=${PORT:-8080} node .next/standalone/server.js
env:
  HOSTNAME: 0.0.0.0
  NODE_ENV: production
  PORT: "8080"
